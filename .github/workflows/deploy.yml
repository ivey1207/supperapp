name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Copy files via rsync
      env:
        SSHPASS: ${{ secrets.PASW }}
      run: |
        sshpass -e rsync -avz --no-perms --no-owner --no-group \
          -e "ssh -q -o StrictHostKeyChecking=no -p 22" \
          --exclude 'node_modules' \
          --exclude 'target' \
          --exclude 'dist' \
          --exclude '.git' \
          --exclude '.github' \
          . root@161.97.118.117:/root/uz-superapp

    - name: Run remote commands
      env:
        SSHPASS: ${{ secrets.PASW }}
      run: |
        sshpass -e ssh -q -o StrictHostKeyChecking=no -p 22 root@161.97.118.117 << 'ENDSSH'
          set -e
          cd /root/uz-superapp
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh
          fi

          echo "Checking swap file..."
          if ! swapon --show | grep -q "/swapfile"; then
            echo "Setting up 2GB swap file..."
            sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          else
            echo "Swap already active."
          fi

          echo "Cleaning up old containers..."
          # Stop and remove project containers more reliably
          docker compose down --remove-orphans || true
          
          # Force remove any containers with the project label
          docker ps -a --filter "label=com.docker.compose.project=uz-superapp" -q | xargs -r docker rm -f || true
          
          # Explicitly remove the default network to avoid "network already exists" errors
          docker network rm uz-superapp_default || true
          
          echo "Building backend-1..."
          docker compose build backend-1
          
          echo "Building backend-2..."
          docker compose build backend-2
          
          echo "Building frontend admin..."
          docker compose build admin-super
          
          echo "Starting containers..."
          # Use --force-recreate to be sure, and don't exit 0 if it fails before logging
          if ! docker compose up -d --remove-orphans --force-recreate; then
            echo "Deploy failed! Printing all containers and logs..."
            docker ps -a
            echo "Logs of backend-1:"
            docker logs uz-superapp-backend-1-1 || true
            echo "Logs of backend-2:"
            docker logs uz-superapp-backend-2-1 || true
            echo "Logs of redis:"
            docker logs uz-superapp-redis-1 || true
            exit 1
          fi
          echo "Deploy completed!"
          docker ps
        ENDSSH
