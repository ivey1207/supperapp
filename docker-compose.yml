services:
  postgres-master:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: superapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archives:/archives
      - ./postgres/init-master.sh:/docker-entrypoint-initdb.d/init-master.sh:ro
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /archives/%f && cp %p /archives/%f"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d superapp" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: superapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      PGPASSWORD: repl_password
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - wal_archives:/archives
      - ./postgres/init-replica.sh:/usr/local/bin/init-replica.sh:ro
    entrypoint: [ "/usr/local/bin/init-replica.sh" ]
    depends_on:
      postgres-master:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SEED_DATABASE: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-master:5432/superapp
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: superapp-jwt-secret-change-in-production-min-256-bits
      FORCE_RESEED: "false"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SEED_DATABASE: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-master:5432/superapp
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: superapp-jwt-secret-change-in-production-min-256-bits
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  nginx-lb:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

  admin-super:
    build:
      context: ./admin-super
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://161.97.118.117:8080
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://161.97.118.117:8080
    depends_on:
      - nginx-lb

  backup:
    image: postgres:16-alpine
    environment:
      POSTGRES_HOST: postgres-master
      POSTGRES_DB: superapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - ./backups:/backups
      - ./backend/uploads:/app/uploads:ro
      - ./scripts/backup.sh:/usr/local/bin/backup.sh
    entrypoint: [ "sh", "-c", "echo \"0 3 * * * sh /usr/local/bin/backup.sh\" > /etc/crontabs/root && crond -f -l 2" ]
    depends_on:
      postgres-master:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_replica_data:
  wal_archives:
  redis_data:
